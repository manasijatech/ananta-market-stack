name: ananta-market-stack-dev

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env.dev
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/app.db}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
      MANASIJA_API_BASE_URL: ${MANASIJA_API_BASE_URL:-https://developers.manasija.in}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      APP_DEBUG: ${APP_DEBUG:-true}
      ALLOW_INSECURE_DEV_CREDENTIALS: ${ALLOW_INSECURE_DEV_CREDENTIALS:-true}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      ENABLE_IN_PROCESS_ALERT_WORKERS: ${ENABLE_IN_PROCESS_ALERT_WORKERS:-true}
      ENABLE_IN_PROCESS_ALPHA_WS_WORKER: ${ENABLE_IN_PROCESS_ALPHA_WS_WORKER:-true}
      ENABLE_IN_PROCESS_WATCHLIST_PRESET_WORKER: ${ENABLE_IN_PROCESS_WATCHLIST_PRESET_WORKER:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend-data:/app/data
      - ./backend/app:/app/app
      - ./backend/broker:/app/broker
      - ./backend/common:/app/common
      - ./backend/db:/app/db
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - ./backend/alembic.ini:/app/alembic.ini
    develop:
      watch:
        - path: ./backend/requirements.txt
          action: rebuild
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    env_file:
      - path: .env.dev
        required: false
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:${BACKEND_PORT:-8000}/api/v1}
      MARKET_STACK_API_INTERNAL_URL: http://backend:8000/api/v1
      MANASIJA_API_BASE_URL: ${MANASIJA_API_BASE_URL:-https://developers.manasija.in}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-docker-dev-secret-change-me}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:${FRONTEND_PORT:-3000},http://127.0.0.1:${FRONTEND_PORT:-3000}}
      AUTH_DATABASE_PATH: /shared-data/app.db
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - backend-data:/shared-data
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/hooks:/app/hooks
      - ./frontend/service:/app/service
      - ./frontend/public:/app/public
      - ./frontend/content:/app/content
      - ./frontend/scripts:/app/scripts
      - ./frontend/proxy.ts:/app/proxy.ts
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/eslint.config.mjs:/app/eslint.config.mjs
      - ./frontend/components.json:/app/components.json
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild
    restart: unless-stopped

volumes:
  backend-data:
