services:
  bootstrap:
    image: python:3.12-alpine
    working_dir: /app
    volumes:
      - ./docker/bootstrap_secrets.py:/app/bootstrap_secrets.py:ro
      - market_stack_config:/config
    environment:
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["python", "/app/bootstrap_secrets.py"]
    restart: "no"

  redis:
    image: redis:7-alpine
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - market_stack_config:/config:ro
      - redis_data:/data
    command:
      - sh
      - -c
      - |
        . /config/market-stack.env
        exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -f /config/market-stack.env ]; then . /config/market-stack.env; fi
          redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/app.db}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8004}
      MANASIJA_API_BASE_URL: ${MANASIJA_API_BASE_URL:-https://developers.manasija.in}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_QUOTE_TTL_SECONDS: ${REDIS_QUOTE_TTL_SECONDS:-30}
      ALLOW_INSECURE_DEV_CREDENTIALS: ${ALLOW_INSECURE_DEV_CREDENTIALS:-false}
      APP_DEBUG: ${APP_DEBUG:-false}
      ENABLE_IN_PROCESS_ALERT_WORKERS: ${ENABLE_IN_PROCESS_ALERT_WORKERS:-true}
      ENABLE_IN_PROCESS_ALPHA_WS_WORKER: ${ENABLE_IN_PROCESS_ALPHA_WS_WORKER:-true}
      ENABLE_IN_PROCESS_WATCHLIST_PRESET_WORKER: ${ENABLE_IN_PROCESS_WATCHLIST_PRESET_WORKER:-true}
    volumes:
      - market_stack_config:/config:ro
      - backend_data:/data
    ports:
      - "${BACKEND_PORT:-8004}:8004"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health', timeout=5).read()"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8004/api/v1}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    environment:
      PORT: 3001
      HOSTNAME: 0.0.0.0
      AUTH_DATABASE_PATH: /data/app.db
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8004/api/v1}
      MARKET_STACK_PUBLIC_APP_URL: ${MARKET_STACK_PUBLIC_APP_URL:-http://localhost:3001}
      MARKET_STACK_PUBLIC_API_BASE_URL: ${MARKET_STACK_PUBLIC_API_BASE_URL:-http://localhost:8004/api/v1}
      MARKET_STACK_API_INTERNAL_URL: ${MARKET_STACK_API_INTERNAL_URL:-http://backend:8004/api/v1}
      MANASIJA_API_BASE_URL: ${MANASIJA_API_BASE_URL:-https://developers.manasija.in}
    volumes:
      - market_stack_config:/config:ro
      - backend_data:/data
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:3001').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  backend_data:
  market_stack_config:
  redis_data:
