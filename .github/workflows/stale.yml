name: Close stale issues and PRs

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has had no activity for 45 days. It will be closed in 10
            days unless there is new activity or the stale label is removed.
          close-issue-message: >
            Closing as stale. If this is still relevant, please comment or open a
            new issue with updated details.
          stale-pr-message: >
            This pull request has had no activity for 30 days. It will be closed
            in 7 days unless there is new activity.
          close-pr-message: >
            Closing as stale. Feel free to reopen or open a fresh PR when ready.
          days-before-issue-stale: 45
          days-before-issue-close: 10
          days-before-pr-stale: 30
          days-before-pr-close: 7
          exempt-issue-labels: pinned,security,good first issue
          exempt-pr-labels: pinned,work in progress
          operations-per-run: 100