name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and the outcome you want. For small fixes, a pull request is often faster than waiting for triage.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Include UI/API notes if relevant.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Frontend / UI
        - Backend API
        - Broker integration
        - Alerts / notifications
        - Docker / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this
          required: false
